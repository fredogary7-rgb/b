<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canal+ Premium - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* Réutilisation de ton style existant */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body { background: #e1e9ff; padding: 20px; color: #444; min-height: 100vh; }
        .container { max-width: 500px; margin: 0 auto; }

        .app-card {
            background: rgba(255, 255, 255, 0.8);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        .icon-large { font-size: 50px; color: #5a57e3; margin-bottom: 15px; }
        
        .ref-box {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 2px dashed #5a57e3;
            margin: 20px 0;
        }
        .ref-text { font-size: 20px; font-weight: 700; color: #5a57e3; }

        .btn-download {
            display: block; width: 100%; padding: 15px;
            background: #5a57e3; color: white; border-radius: 12px;
            text-decoration: none; font-weight: 600; margin-bottom: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="app-card">
        <div class="icon-large"><i class="fa fa-tv"></i></div>
        <h1>{{ app.name }}</h1>
        <p style="font-size: 13px; margin: 10px 0;">Installation et accès aux chaînes</p>

        <a class="btn-download" href="{{ app.link }}">
            <i class="fa fa-download"></i> Télécharger l'APK
        </a>

        <div class="ref-box">
            <p style="font-size: 12px; color: #666;">Référence de connexion :</p>
            <div class="ref-text">{{ app.reference }}</div>
        </div>

        <div style="text-align: left; font-size: 13px; color: #666;">
            <p><strong>Instructions :</strong></p>
            <ul style="margin-top: 10px; padding-left: 20px;">
                <li>Téléchargez puis installez le fichier APK.</li>
                <li>Ouvrez l'application.</li>
                <li>Saisissez la référence ci-dessus pour activer les chaînes.</li>
            </ul>
        </div>
    </div>
    
    <a href="/apk" style="display:block; text-align:center; color:#5a57e3; text-decoration:none;">
        <i class="fa fa-arrow-left"></i> Retour aux applications
    </a>
</div>

</body>
</html>
