<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Retrait Local - NovaTrade</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: #f0f4ff; padding: 30px; }
.container { max-width: 500px; margin: auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
h1 { text-align: center; color: #5a57e3; margin-bottom: 20px; }
label { display: block; margin-bottom: 8px; font-weight: 600; }
input, select, button { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 10px; border: 1px solid #ccc; font-size: 14px; }
button { background: #5a57e3; color: #fff; border: none; cursor: pointer; font-weight: 600; }
button:hover { background: #4844c0; }
pre { background: #f1f5f9; padding: 15px; border-radius: 10px; font-size: 13px; max-height: 300px; overflow-y: auto; }
</style>
</head>
<body>

<div class="container">
  <h1>Test Retrait Local</h1>

  <form id="testRetraitForm">
    <label for="username">Nom d'utilisateur</label>
    <input type="text" id="username" value="novatrade" required>

    <label for="service_id">Service ID</label>
    <input type="number" id="service_id" value="37" required>

    <label for="montant">Montant (XOF)</label>
    <input type="number" id="montant" value="50000" required>

    <button type="submit">Envoyer le retrait</button>
  </form>

  <h3>Réponse API :</h3>
  <pre id="responseOutput">Aucune requête envoyée</pre>
</div>

<script>
document.getElementById('testRetraitForm').addEventListener('submit', async function(e) {
  e.preventDefault();

  const username = document.getElementById('username').value;
  const service_id = document.getElementById('service_id').value;
  const montant = document.getElementById('montant').value;

  try {
    const response = await fetch(`/admin/debug_retrait/${username}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: `payment_method=${service_id}&montant=${montant}`
    });
    const data = await response.json();
    document.getElementById('responseOutput').textContent = JSON.stringify(data, null, 2);
  } catch (err) {
    document.getElementById('responseOutput').textContent = 'Erreur : ' + err;
  }
});
</script>

</body>
</html>
