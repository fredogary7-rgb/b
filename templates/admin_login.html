<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Access - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* BASE STYLE NOVATRADE */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        
        body {
            background: #e1e9ff;
            background-image: radial-gradient(at 0% 0%, rgba(197, 202, 255, 0.5) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(225, 200, 255, 0.4) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 380px;
            border: 1px solid white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        .login-card i.main-icon {
            font-size: 40px;
            color: #5a57e3;
            margin-bottom: 20px;
            background: white;
            width: 80px;
            height: 80px;
            line-height: 80px;
            border-radius: 25px;
            display: inline-block;
            box-shadow: 0 10px 20px rgba(90, 87, 227, 0.1);
        }

        h2 {
            font-size: 22px;
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 10px;
        }

        p {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 30px;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border-radius: 15px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            background: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
            color: #334155;
        }

        input:focus {
            border-color: #5a57e3;
            box-shadow: 0 0 0 4px rgba(90, 87, 227, 0.1);
        }

        button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
            border: none;
            background: linear-gradient(135deg, #5a57e3, #8e54e9);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(90, 87, 227, 0.2);
            transition: 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 25px rgba(90, 87, 227, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .footer-link {
            margin-top: 25px;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="login-card">
    <i class="fa fa-user-shield main-icon"></i>
    <h2>Admin NovaTrade</h2>
    <p>Espace de gestion sécurisé</p>
    
    <form method="POST">
        <div class="input-group">
            <i class="fa fa-user"></i>
            <input type="text" name="username" placeholder="Identifiant" required>
        </div>
        
        <div class="input-group">
            <i class="fa fa-lock"></i>
            <input type="password" name="password" placeholder="Mot de passe" required>
        </div>
        
        <button type="submit">Authentification</button>
    </form>

    <div class="footer-link">
        2026 © NovaTrade Control Panel
    </div>
</div>

</body>
</html>
