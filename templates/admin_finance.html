<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Terminal - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* DESIGN NOVATRADE ELITE */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        
        body {
            background: #e1e9ff;
            background-image: radial-gradient(at 0% 0%, rgba(197, 202, 255, 0.5) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(225, 200, 255, 0.4) 0px, transparent 50%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(20px);
            padding: 40px 30px;
            border-radius: 30px;
            width: 100%;
            max-width: 360px;
            border: 1px solid white;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.05);
            text-align: center;
        }

        h2 { font-size: 22px; color: #1e293b; font-weight: 700; margin-bottom: 25px; }

        /* FLASH MESSAGES */
        .flash {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            margin-bottom: 20px;
            font-weight: 500;
        }
        .flash.danger { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
        .flash.success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }

        /* INPUTS */
        input {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 15px;
            border-radius: 15px;
            border: 1px solid rgba(0, 0, 0, 0.05);
            background: white;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: #5a57e3; box-shadow: 0 0 0 4px rgba(90, 87, 227, 0.1); }

        /* BUTTON & LOADER LOGIC */
        button {
            width: 100%;
            padding: 15px;
            border: none;
            background: linear-gradient(135deg, #5a57e3, #8e54e9);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.3s;
            overflow: hidden;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(90, 87, 227, 0.2); }

        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid #ffffff;
            border-radius: 50%;
            width: 18px;
            height: 18px;
            animation: spin 0.8s linear infinite;
            display: none; /* Masqué par défaut */
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="login-card">
    <div style="margin-bottom: 20px;">
        <i class="fa fa-shield-halved" style="font-size: 40px; color: #5a57e3;"></i>
    </div>
    
    <h2>Admin Login</h2>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" id="loginForm">
        <input type="text" name="username" placeholder="Nom d'utilisateur" required>
        <input type="password" name="password" placeholder="Mot de passe" required>
        
        <button type="submit" id="submitBtn">
            <span id="btnText">Se connecter</span>
            <div class="loader" id="loader"></div>
        </button>
    </form>
    
    <p style="margin-top: 25px; font-size: 11px; color: #94a3b8; letter-spacing: 1px; text-transform: uppercase;">
        NovaTrade Security Terminal
    </p>
</div>

<script>
    const form = document.getElementById('loginForm');
    const loader = document.getElementById('loader');
    const btnText = document.getElementById('btnText');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', () => {
        // Empêche les doubles clics
        submitBtn.style.pointerEvents = 'none';
        submitBtn.style.opacity = '0.8';
        
        // Affiche le loader à côté du texte
        loader.style.display = 'inline-block';
        btnText.innerText = 'Connexion...';
    });
</script>

</body>
</html>
