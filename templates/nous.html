<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        /* BASE - Fond identique au Dashboard NovaTrade */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        
        body {
            background: #e1e9ff;
            background-image: radial-gradient(at 0% 0%, rgba(197, 202, 255, 0.5) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(225, 200, 255, 0.4) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #444;
        }

        /* CONTAINER GLASSMORPHISM */
        .contact-card {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 30px;
            padding: 40px 30px;
            text-align: center;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.05);
        }

        /* ICON HEADER */
        .icon-circle {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #8e54e9 0%, #4776e6 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 32px;
            box-shadow: 0 10px 20px rgba(90, 87, 227, 0.2);
        }

        h1 {
            font-size: 24px;
            color: #1e293b;
            margin-bottom: 15px;
            font-weight: 700;
        }

        p {
            font-size: 14px;
            color: #64748b;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* BOUTON EMAIL (Style Bouton Copier Dashboard) */
        .email-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background: #5a57e3;
            color: #fff;
            padding: 16px 30px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            text-decoration: none;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(90, 87, 227, 0.25);
        }

        .email-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
            box-shadow: 0 12px 25px rgba(90, 87, 227, 0.35);
        }

        .email-btn i {
            font-size: 18px;
        }

        /* FOOTER */
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
        }

        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #4776e6;
            text-decoration: none;
            font-size: 13px;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div style="width: 100%; display: flex; flex-direction: column; align-items: center;">
    <div class="contact-card">
        <div class="icon-circle">
            <i class="fa fa-headset"></i>
        </div>
        
        <h1>Contacter le service NovaTrade</h1>
        
        <p>Vous avez une question ou besoin d'assistance ? Notre équipe support est à votre écoute pour vous répondre dans les plus brefs délais.</p>
        
        <a href="mailto:novatrade2026@gmail.com" class="email-btn">
            <i class="fa fa-envelope"></i> Envoyer un e-mail
        </a>

        <a href="/dashboard" class="back-link">Retour au tableau de bord</a>
    </div>

    <footer>2026 © NovaTrade • Propulsion par l'excellence</footer>
</div>

</body>
</html>
