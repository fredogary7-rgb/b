<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* STYLE NOVATRADE - GLASSMORPHISM */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }

        body {
            background: #e1e9ff;
            background-image: radial-gradient(at 0% 0%, rgba(197, 202, 255, 0.5) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(225, 200, 255, 0.4) 0px, transparent 50%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-card {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 25px;
            padding: 25px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(100, 100, 100, 0.05);
        }

        .header-box {
            background: linear-gradient(135deg, #8e54e9 0%, #4776e6 100%);
            margin: -25px -25px 25px -25px;
            padding: 20px;
            border-radius: 25px 25px 15px 15px;
            display: flex;
            align-items: center;
            color: white;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .header-box img {
            width: 45px;
            height: 45px;
            border-radius: 12px;
            margin-right: 15px;
            background: white;
            padding: 4px;
        }

        .header-box h2 { font-size: 22px; font-weight: 600; letter-spacing: 0.5px; }

        .title-section { text-align: center; margin-bottom: 20px; }
        .title-section h1 { font-size: 20px; color: #444; margin-bottom: 5px; font-weight: 700; }
        .title-section p { font-size: 13px; color: #666; line-height: 1.4; }

        label { display: block; font-size: 12px; font-weight: 700; color: #5a57e3; text-transform: uppercase; margin-bottom: 6px; margin-left: 5px; opacity: 0.8; }

        .input-wrapper { position: relative; margin-bottom: 15px; }

        .input-wrapper input, .input-wrapper select {
            width: 100%;
            padding: 12px 15px;
            border-radius: 15px;
            border: 1px solid white;
            background: rgba(255, 255, 255, 0.8);
            font-size: 14px;
            color: #333;
            outline: none;
            transition: 0.3s ease;
        }

        .input-wrapper input:focus { border-color: #5a57e3; background: #fff; }

        .password-toggle {
            position: absolute; right: 15px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; cursor: pointer; font-size: 16px;
        }

        .btn-submit {
            width: 100%; padding: 14px; border: none; border-radius: 15px;
            background: #5a57e3; color: white; font-weight: 700; font-size: 16px;
            cursor: pointer; transition: 0.3s ease;
            box-shadow: 0 6px 20px rgba(90, 87, 227, 0.2);
        }

        .btn-submit:hover { transform: translateY(-2px); filter: brightness(1.1); }

        .alert { padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 13px; font-weight: 600; text-align: center; }
        .flash.danger { background: #fee2e2; color: #dc2626; }
        .flash.success { background: #dcfce7; color: #16a34a; }

        .login-footer { text-align: center; margin-top: 15px; font-size: 13px; color: #666; }
        .login-footer a { color: #5a57e3; text-decoration: none; font-weight: 700; }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="header-box">
            <img src="/static/images/n.jpg" alt="NovaTrade">
            <h2>NovaTrade</h2>
        </div>

        <div class="title-section">
            <h1>Inscription gratuite</h1>
            <p>Rejoignez LuminaStar et commencez à gagner dès aujourd'hui.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert flash {{ category }}">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('inscription_page') }}">

            <label>Nom d'utilisateur</label>
            <div class="input-wrapper">
                <input type="text" name="username" placeholder="Choisissez un pseudo" required 
                       value="{{ '' if session.get('username_exists') else request.form.get('username','') }}">
            </div>

            <label>Adresse email</label>
            <div class="input-wrapper">
                <input type="email" name="email" placeholder="votre@email.com" required value="{{ request.form.get('email','') }}">
            </div>

            <label>Sélectionner votre pays</label>
            <div class="input-wrapper">
                <select name="country" required>
                    <option value="" disabled selected>Choisir un pays</option>
                    {% for c in ["Togo","Bénin","Côte d'Ivoire","Cameroun","Sénégal","Burkina Faso","Congo Brazzaville","Congo Kinshasa","Niger","Gabon","Mali"] %}
                        <option value="{{ c }}" {% if request.form.get('country') == c %}selected{% endif %}>{{ c }}</option>
                    {% endfor %}
                </select>
            </div>

            <label>Numéro de téléphone</label>
            <div class="input-wrapper">
                <input type="tel" name="phone" placeholder="Numéro sans indicatif" required value="{{ request.form.get('phone','') }}">
            </div>

            <label>Parrain</label>
            <div class="input-wrapper">
                <input type="text" name="parrain" value="{{ request.form.get('parrain', code_ref) }}" readonly 
                       style="background: rgba(0,0,0,0.05); color: #64748b; cursor: not-allowed;">
            </div>

            <label>Mot de passe</label>
            <div class="input-wrapper">
                <input type="password" id="pass" name="password" placeholder="••••••••" required>
                <i class="fa fa-eye password-toggle" onclick="togglePass('pass')"></i>
            </div>

            <label>Confirmation</label>
            <div class="input-wrapper">
                <input type="password" id="conf" name="confirm_password" placeholder="••••••••" required>
                <i class="fa fa-eye password-toggle" onclick="togglePass('conf')"></i>
            </div>

            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 20px;">
                <input type="checkbox" required id="terms" name="terms" {% if request.form.get('terms') %}checked{% endif %}>
                <label for="terms" style="margin:0; text-transform: none; font-weight: 500; font-size: 12px; color: #666;">J'accepte les conditions</label>
            </div>

            <button type="submit" class="btn-submit">Créer mon compte</button>
        </form>

        <div class="login-footer">
            Déjà inscrit ? <a href="{{ url_for('connexion_page') }}">Se connecter</a>
        </div>
    </div>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            const icon = input.nextElementSibling;
            if (input.type === "password") {
                input.type = "text";
                icon.classList.replace("fa-eye", "fa-eye-slash");
            } else {
                input.type = "password";
                icon.classList.replace("fa-eye-slash", "fa-eye");
            }
        }
    </script>
</body>
</html>
