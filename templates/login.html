<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion | My Meeting</title>
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --accent-color: #00d2ff;
            --glass-bg: rgba(255, 255, 255, 0.12);
            --glass-border: rgba(255, 255, 255, 0.2);
            --text-color: #ffffff;
        }

        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Poppins', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            background: url('https://images.unsplash.com/photo-1529156069898-49953e39b3ac?auto=format&fit=crop&q=80&w=1920') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        .overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 50px 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.4);
            color: var(--text-color);
            text-align: center;
        }

        .logo {
            font-size: 2.8rem;
            font-weight: 800;
            margin-bottom: 5px;
            letter-spacing: -1px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-color);
            font-weight: 300;
            font-style: italic;
        }

        .tagline {
            font-size: 1rem;
            margin-bottom: 20px;
            font-weight: 300;
            color: rgba(255, 255, 255, 0.8);
        }

        .flash-message {
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            font-size: 0.75rem;
            text-transform: uppercase;
            margin-bottom: 8px;
            margin-left: 5px;
            font-weight: 600;
            color: var(--accent-color);
        }

        input {
            padding: 14px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.3);
            background: rgba(255, 255, 255, 0.08);
            color: white;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--accent-color);
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 25px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .remember-me input {
            margin-right: 8px;
            width: 16px;
            height: 16px;
        }

        .forgot-password {
            color: var(--accent-color);
            text-decoration: none;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--primary-gradient);
            color: white;
            font-size: 1.1rem;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(118, 75, 162, 0.4);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .footer-link {
            margin-top: 25px;
            font-size: 0.9rem;
            color: rgba(255,255,255,0.7);
        }

        .footer-link a {
            color: var(--accent-color);
            text-decoration: none;
            font-weight: bold;
        }

        .footer-link a:hover { text-decoration: underline; }

        @media (max-width: 500px) {
            .container { padding: 30px 20px; }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="overlay"></div>

    <div class="container">
        <div class="logo">My <span>Meeting</span></div>
        <p class="tagline">Ravi de vous revoir !</p>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div class="flash-message">
              {% for category, message in messages %}
                <p style="color: {% if category=='danger' %}#ff6b6b{% elif category=='warning' %}#feca57{% else %}#1dd1a1{% endif %};">
                  {{ message }}
                </p>
              {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="Votre email" required>
            </div>

            <div class="form-group">
                <label>Mot de passe</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="options">
                <label class="remember-me">
                    <input type="checkbox" name="remember"> Se souvenir de moi
                </label>
                <a href="/forgot" class="forgot-password">Oublié ?</a>
            </div>

            <button type="submit" class="btn-submit">Se connecter</button>
        </form>

        <div class="footer-link">
            Pas encore de compte ? <a href="/signup">S'inscrire gratuitement</a>
        </div>
    </div>

</body>
</html>
