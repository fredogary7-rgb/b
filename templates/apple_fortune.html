<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple of Fortune - NovaTrade</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        /* STYLE NOVATRADE */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        body {
            background: #e1e9ff;
            background-image: radial-gradient(at 0% 0%, rgba(197, 202, 255, 0.5) 0px, transparent 50%),
                              radial-gradient(at 100% 100%, rgba(225, 200, 255, 0.4) 0px, transparent 50%);
            min-height: 100vh; color: #444; overflow-x: hidden;
        }

        /* ÉCRAN DE VERROUILLAGE */
        #lock-screen {
            position: fixed; inset: 0; background: #e1e9ff;
            display: none; flex-direction: column; align-items: center;
            justify-content: center; z-index: 9999; text-align: center; padding: 20px;
        }

        .topbar {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 20px; background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(15px); border-bottom: 1px solid white;
        }

        .game-wrapper { max-width: 450px; margin: 10px auto; padding: 15px; }

        /* GRILLE DE JEU */
        .grid { display: flex; flex-direction: column-reverse; gap: 8px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; opacity: 0.3; pointer-events: none; transition: 0.4s; }
        .row.active { opacity: 1; pointer-events: all; }

        .cell {
            aspect-ratio: 1/1; background: white; border: 2px solid #5a57e3;
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(90, 87, 227, 0.05);
        }
        .cell.good { background: #dcfce7; border-color: #22c55e; color: #16a34a; }
        .cell.bad { background: #fee2e2; border-color: #ef4444; color: #dc2626; animation: shake 0.3s; }

        .status-box {
            background: white; padding: 20px; border-radius: 20px; margin-top: 20px;
            text-align: center; border: 1px solid white; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }
        .btn-start {
            background: #5a57e3; color: white; border: none; padding: 15px;
            border-radius: 15px; font-weight: 700; width: 100%; cursor: pointer;
        }

        .chance-badge { background: #ffd700; color: #000; padding: 2px 10px; border-radius: 10px; font-size: 12px; font-weight: bold; }
        
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-5px);} 75% {transform: translateX(5px);} }
    </style>
</head>
<body>

<div id="lock-screen">
    <i class="fa fa-calendar-alt" style="font-size: 50px; color: #5a57e3; margin-bottom: 20px;"></i>
    <h2 id="lock-title">Bientôt disponible</h2>
    <p id="lock-msg" style="margin-top: 10px; color: #666;"></p>
    <a href="/dashboard" style="margin-top: 20px; color: #5a57e3; text-decoration: none; font-weight: bold;">Retour</a>
</div>

<div class="topbar">
    <a href="/dashboard" style="color:#5a57e3;"><i class="fa fa-chevron-left"></i></a>
    <div style="font-weight:700; color:#5a57e3; font-size:14px;">APPLE OF FORTUNE</div>
    <div style="background:#5a57e3; color:white; padding:5px 12px; border-radius:20px; font-size:12px;">
        COMM: <span id="comm-ui">{{ user.commission }}</span> XOF
    </div>
</div>

<div class="game-wrapper">
    <div class="grid" id="appleGrid"></div>

    <div class="status-box">
        <div style="margin-bottom:10px;">
            <span class="chance-badge">Chances : <span id="chances-count">3</span>/3</span>
        </div>
        <div id="step-info" style="margin-bottom:15px; font-weight:700; color:#5a57e3;">Gain : 500 XOF Commission</div>
        <button id="playBtn" class="btn-start" onclick="startAttempt()">Jouer maintenant</button>
    </div>
</div>

<script>
    const totalRows = 10;
    let currentStep = 0;
    let gameActive = false;
    let chances = 3;

    // --- VÉRIFICATION DU TEMPS ET DES CHANCES ---
    function checkRestrictions() {
        const now = new Date();
        const day = now.getDay(); // 1 = Lundi
        const hour = now.getHours();
        const lockScreen = document.getElementById('lock-screen');
        const lockMsg = document.getElementById('lock-msg');

        // Restriction : Uniquement Lundi à partir de 8h
        if (day !== 1 || hour < 8) {
            lockScreen.style.display = 'flex';
            lockMsg.innerText = "Le jeu Apple of Fortune ouvre tous les lundis à partir de 08:00.";
            return false;
        }

        // Restriction : 3 chances par jour
        const today = now.toDateString();
        const storedDate = localStorage.getItem('apple_date');
        if (storedDate !== today) {
            localStorage.setItem('apple_date', today);
            localStorage.setItem('apple_chances', '3');
            chances = 3;
        } else {
            chances = parseInt(localStorage.getItem('apple_chances') || '0');
        }

        document.getElementById('chances-count').innerText = chances;
        if (chances <= 0) {
            lockScreen.style.display = 'flex';
            document.getElementById('lock-title').innerText = "Session terminée";
            lockMsg.innerText = "Vous avez épuisé vos 3 chances pour aujourd'hui. Revenez lundi prochain !";
            return false;
        }
        return true;
    }

    function createGrid() {
        const grid = document.getElementById('appleGrid');
        grid.innerHTML = '';
        for (let i = 0; i < totalRows; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            row.id = `row-${i}`;
            for (let j = 0; j < 5; j++) {
                row.innerHTML += `<div class="cell" onclick="checkApple(${i}, ${j})"><i class="fa fa-question" style="opacity:0.1"></i></div>`;
            }
            grid.appendChild(row);
        }
    }

    function startAttempt() {
        if (!checkRestrictions()) return;
        
        chances--;
        localStorage.setItem('apple_chances', chances.toString());
        document.getElementById('chances-count').innerText = chances;
        
        gameActive = true;
        currentStep = 0;
        document.getElementById('playBtn').disabled = true;
        document.getElementById('playBtn').style.opacity = '0.5';
        createGrid(); 
        activateRow(0);
    }

    function activateRow(step) {
        document.querySelectorAll('.row').forEach(r => r.classList.remove('active'));
        document.getElementById(`row-${step}`).classList.add('active');
        document.getElementById('step-info').innerText = `ÉTAPE ${step + 1} / 10`;
    }

    async function checkApple(rowIdx, cellIdx) {
        if (!gameActive || rowIdx !== currentStep) return;

        // Probabilités de réussite
        let winProb = (currentStep < 3) ? 0.7 : (currentStep < 7) ? 0.4 : 0.2;
        let success = Math.random() < winProb;
        const cells = document.getElementById(`row-${rowIdx}`).querySelectorAll('.cell');
        
        if (success) {
            cells[cellIdx].className = 'cell good';
            cells[cellIdx].innerHTML = '<i class="fa fa-apple-alt"></i>';
            currentStep++;
            if (currentStep < totalRows) {
                activateRow(currentStep);
            } else {
                gameActive = false;
                await winReward();
            }
        } else {
            cells[cellIdx].className = 'cell bad';
            cells[cellIdx].innerHTML = '<i class="fa fa-skull"></i>';
            gameActive = false;
            setTimeout(() => {
                alert("Pomme pourrie ! Tentative terminée.");
                if (chances > 0) {
                    document.getElementById('playBtn').disabled = false;
                    document.getElementById('playBtn').style.opacity = '1';
                } else {
                    location.reload();
                }
            }, 600);
        }
    }

    async function winReward() {
        const res = await fetch('/game/apple-reward', { method: 'POST' });
        const data = await res.json();
        if (data.status === 'success') {
            alert("FÉLICITATIONS ! 500 XOF ajoutés à votre commission.");
            location.reload();
        }
    }

    window.onload = () => {
        checkRestrictions();
        createGrid();
    };
</script>
</body>
</html>
